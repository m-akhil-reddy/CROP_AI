<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aadhaar Verification — Crop Damage Assessment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div id="navbar-root"></div>

    <!-- Progress Steps -->
    <div class="container mt-4">
        <div class="steps-bar">
            <div class="step-item completed"><div class="step-circle">✓</div><div class="step-label">Login</div></div>
            <div class="step-line active"></div>
            <div class="step-item active"><div class="step-circle">2</div><div class="step-label">Identity</div></div>
            <div class="step-line"></div>
            <div class="step-item"><div class="step-circle">3</div><div class="step-label">Bank</div></div>
            <div class="step-line"></div>
            <div class="step-item"><div class="step-circle">4</div><div class="step-label">Land</div></div>
            <div class="step-line"></div>
            <div class="step-item"><div class="step-circle">5</div><div class="step-label">Dashboard</div></div>
        </div>
    </div>

    <div class="page-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-7">
                    <div class="card-govt fade-in">
                        <div class="card-header-govt"><i class="bi bi-person-vcard"></i> Aadhaar & Ration Card Verification</div>
                        <div class="card-body">
                            <form id="identityForm" onsubmit="return false;">
                                <!-- Aadhaar -->
                                <div class="mb-4">
                                    <label class="form-label-govt" for="aadhaarInput">Aadhaar Number <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <input type="text" id="aadhaarInput" class="form-control form-control-govt" placeholder="Enter 12-digit Aadhaar number" maxlength="12">
                                        <button type="button" class="btn btn-govt" onclick="verifyAadhaar()"><i class="bi bi-patch-check"></i> Verify</button>
                                    </div>
                                    <div class="invalid-feedback">Aadhaar must be exactly 12 digits.</div>
                                    <div id="aadhaarStatus" class="mt-2"></div>
                                </div>

                                <!-- Ration Card Type -->
                                <div class="mb-3">
                                    <label class="form-label-govt" for="rationTypeSelect">Ration Card Type</label>
                                    <select id="rationTypeSelect" class="form-select form-select-govt">
                                        <option value="">Select Ration Card Type</option>
                                        <option value="White ration card">White Ration Card</option>
                                        <option value="Pink ration card">Pink Ration Card</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>

                                <!-- Ration Card Number -->
                                <div class="mb-4">
                                    <label class="form-label-govt" for="rationNumberInput">Ration Card Number</label>
                                    <input type="text" id="rationNumberInput" class="form-control form-control-govt" placeholder="Enter ration card number">
                                </div>

                                <button type="button" id="continueBtn" class="btn btn-govt w-100" onclick="saveIdentity()" disabled>
                                    <i class="bi bi-arrow-right"></i> Save & Continue
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/aadhaar.js"></script>
</body>
</html>

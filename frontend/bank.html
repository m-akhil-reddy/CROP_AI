<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Details — Crop Damage Assessment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div id="navbar-root"></div>
    <div class="container mt-4">
        <div class="steps-bar">
            <div class="step-item completed"><div class="step-circle">✓</div><div class="step-label">Login</div></div>
            <div class="step-line active"></div>
            <div class="step-item completed"><div class="step-circle">✓</div><div class="step-label">Identity</div></div>
            <div class="step-line active"></div>
            <div class="step-item active"><div class="step-circle">3</div><div class="step-label">Bank</div></div>
            <div class="step-line"></div>
            <div class="step-item"><div class="step-circle">4</div><div class="step-label">Land</div></div>
            <div class="step-line"></div>
            <div class="step-item"><div class="step-circle">5</div><div class="step-label">Dashboard</div></div>
        </div>
    </div>
    <div class="page-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-7">
                    <div class="card-govt fade-in">
                        <div class="card-header-govt"><i class="bi bi-bank2"></i> Bank Account Details</div>
                        <div class="card-body">
                            <form id="bankForm" onsubmit="return false;">
                                <div class="mb-3">
                                    <label class="form-label-govt" for="holderName">Account Holder Name <span class="text-danger">*</span></label>
                                    <input type="text" id="holderName" class="form-control form-control-govt" placeholder="Enter full name" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label-govt" for="ifscCode">IFSC Code <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <input type="text" id="ifscCode" class="form-control form-control-govt" placeholder="e.g. SBIN0001234" maxlength="11" style="text-transform:uppercase;">
                                        <button type="button" class="btn btn-govt-outline" onclick="detectBank()"><i class="bi bi-search"></i></button>
                                    </div>
                                    <div id="bankDetected" class="mt-1"></div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label-govt" for="bankName">Bank Name <span class="text-danger">*</span></label>
                                    <input type="text" id="bankName" class="form-control form-control-govt" placeholder="Bank name" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label-govt" for="accountNumber">Account Number <span class="text-danger">*</span></label>
                                    <input type="text" id="accountNumber" class="form-control form-control-govt" placeholder="Enter account number" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label-govt" for="confirmAccount">Confirm Account Number <span class="text-danger">*</span></label>
                                    <input type="text" id="confirmAccount" class="form-control form-control-govt" placeholder="Re-enter account number" required>
                                    <div class="invalid-feedback">Account numbers do not match.</div>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label-govt" for="branchName">Branch Name</label>
                                    <input type="text" id="branchName" class="form-control form-control-govt" placeholder="Branch name">
                                </div>
                                <button type="button" class="btn btn-govt w-100" onclick="saveBank()">
                                    <i class="bi bi-arrow-right"></i> Save & Continue
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/bank.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Claim — Crop Damage Assessment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div id="navbar-root"></div>

    <div class="page-wrapper">
        <div class="container">
            <h4 class="section-title"><i class="bi bi-file-earmark-plus"></i> Submit Insurance Claim</h4>

            <div class="row">
                <div class="col-lg-8">
                    <!-- Section 1: Crop Details -->
                    <div class="card-govt mb-4 fade-in">
                        <div class="card-header-govt"><i class="bi bi-flower1"></i> Crop & Damage Details</div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label-govt">Crop Type <span class="text-danger">*</span></label>
                                    <select id="cropType" class="form-select form-select-govt">
                                        <option value="">Select crop</option>
                                        <option>Rice</option><option>Cotton</option><option>Wheat</option><option>Tomato</option><option>Maize</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label-govt">Damage Type <span class="text-danger">*</span></label>
                                    <select id="damageType" class="form-select form-select-govt">
                                        <option value="">Select damage</option>
                                        <option>Flood</option><option>Insect attack</option><option>Drought</option><option>Heavy rain</option><option>Disease</option><option>Animal attack</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label-govt">Crop Stage</label>
                                    <select id="cropStage" class="form-select form-select-govt">
                                        <option>Seed stage</option><option selected>Growing stage</option><option>Harvest stage</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label-govt">Estimated Loss (₹)</label>
                                    <input type="number" id="estimatedLoss" class="form-control form-control-govt" placeholder="e.g. 50000">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label-govt">Damage Percentage: <strong id="dmgLabel">50</strong>%</label>
                                <input type="range" id="damagePercentage" class="form-range" min="0" max="100" value="50" oninput="document.getElementById('dmgLabel').textContent=this.value">
                            </div>
                        </div>
                    </div>

                    <!-- Section 2: File Uploads -->
                    <div class="card-govt mb-4 fade-in fade-in-delay-1">
                        <div class="card-header-govt"><i class="bi bi-camera"></i> Upload Evidence</div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label-govt">Crop Damage Images</label>
                                <input type="file" id="imageUpload" class="form-control form-control-govt" accept="image/*" multiple onchange="previewFiles('imageUpload','imagePreview')">
                                <div id="imagePreview" class="preview-grid mt-2"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label-govt">Crop Damage Videos</label>
                                <input type="file" id="videoUpload" class="form-control form-control-govt" accept="video/*" onchange="previewVideo()">
                                <div id="videoPreview" class="mt-2"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Section 3: GPS Verification -->
                    <div class="card-govt mb-4 fade-in fade-in-delay-2">
                        <div class="card-header-govt"><i class="bi bi-geo-alt"></i> GPS Verification</div>
                        <div class="card-body">
                            <button type="button" class="btn btn-accent w-100 mb-2" onclick="captureClaimGPS()">
                                <i class="bi bi-crosshair"></i> Capture Current Location
                            </button>
                            <div id="claimGpsStatus" class="mb-2"></div>
                            <input type="hidden" id="claimGps" value="">
                            <div id="claimMap" class="map-container" style="display:none;"></div>
                        </div>
                    </div>

                    <!-- Section 4: Run AI Analysis -->
                    <div class="card-govt mb-4 fade-in fade-in-delay-3">
                        <div class="card-header-govt"><i class="bi bi-cpu"></i> AI Analysis</div>
                        <div class="card-body">
                            <button type="button" class="btn btn-govt w-100 mb-3" onclick="runAIAnalysis()">
                                <i class="bi bi-lightning-charge"></i> Run AI Crop Damage Analysis
                            </button>
                            <div id="aiResultSection" style="display:none;"></div>
                        </div>
                    </div>

                    <!-- Submit -->
                    <button type="button" id="submitClaimBtn" class="btn btn-govt w-100 py-3 mb-4" onclick="submitClaim()" disabled style="font-size:1.1rem;">
                        <i class="bi bi-send-check"></i> Submit Insurance Claim
                    </button>
                </div>

                <!-- Sidebar Summary -->
                <div class="col-lg-4">
                    <div class="card-govt sticky-top" style="top:80px;">
                        <div class="card-header-govt"><i class="bi bi-info-circle"></i> Claim Summary</div>
                        <div class="card-body" id="claimSummary">
                            <p class="text-muted">Fill in the details and run AI analysis to see your claim summary here.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/claim.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Land Details — Crop Damage Assessment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div id="navbar-root"></div>
    <div class="container mt-4">
        <div class="steps-bar">
            <div class="step-item completed"><div class="step-circle">✓</div><div class="step-label">Login</div></div>
            <div class="step-line active"></div>
            <div class="step-item completed"><div class="step-circle">✓</div><div class="step-label">Identity</div></div>
            <div class="step-line active"></div>
            <div class="step-item completed"><div class="step-circle">✓</div><div class="step-label">Bank</div></div>
            <div class="step-line active"></div>
            <div class="step-item active"><div class="step-circle">4</div><div class="step-label">Land</div></div>
            <div class="step-line"></div>
            <div class="step-item"><div class="step-circle">5</div><div class="step-label">Dashboard</div></div>
        </div>
    </div>
    <div class="page-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card-govt fade-in">
                        <div class="card-header-govt"><i class="bi bi-geo-alt"></i> Land Registration Details</div>
                        <div class="card-body">
                            <form id="landForm" onsubmit="return false;">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label-govt" for="surveyNumber">Survey Number <span class="text-danger">*</span></label>
                                        <input type="text" id="surveyNumber" class="form-control form-control-govt" placeholder="Enter survey number" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label-govt" for="passbookNumber">Passbook Number</label>
                                        <input type="text" id="passbookNumber" class="form-control form-control-govt" placeholder="Enter passbook number">
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label-govt" for="landArea">Land Area (acres) <span class="text-danger">*</span></label>
                                        <input type="number" id="landArea" class="form-control form-control-govt" placeholder="e.g. 2.5" step="0.1" required>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label-govt" for="village">Village <span class="text-danger">*</span></label>
                                        <input type="text" id="village" class="form-control form-control-govt" placeholder="Village name" required>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label-govt" for="mandal">Mandal <span class="text-danger">*</span></label>
                                        <input type="text" id="mandal" class="form-control form-control-govt" placeholder="Mandal name" required>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label-govt" for="district">District <span class="text-danger">*</span></label>
                                        <input type="text" id="district" class="form-control form-control-govt" placeholder="District name" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label-govt" for="state">State <span class="text-danger">*</span></label>
                                        <input type="text" id="state" class="form-control form-control-govt" placeholder="State name" value="Telangana" required>
                                    </div>
                                </div>

                                <!-- GPS Section -->
                                <div class="mb-3">
                                    <label class="form-label-govt">GPS Location</label>
                                    <button type="button" class="btn btn-accent w-100 mb-2" onclick="captureGPS()">
                                        <i class="bi bi-crosshair"></i> Capture GPS Location
                                    </button>
                                    <div id="gpsStatus" class="mb-2"></div>
                                    <input type="hidden" id="gpsLocation" value="">
                                    <div id="map" class="map-container" style="display:none;"></div>
                                </div>

                                <div id="surveyVerify" class="mb-3"></div>

                                <button type="button" class="btn btn-govt w-100" onclick="saveLand()">
                                    <i class="bi bi-arrow-right"></i> Save & Continue to Dashboard
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/land.js"></script>
</body>
</html>

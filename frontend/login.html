<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-Based Crop Damage Assessment and Compensation System — Farmer Login Portal">
    <title>Login — Crop Damage Assessment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon"><i class="bi bi-tree"></i></div>
                <h2>Crop Damage Assessment</h2>
                <p>AI-Based Insurance Compensation System</p>
            </div>

            <!-- Phone Input Section -->
            <div id="phoneSection">
                <div class="mb-3">
                    <label class="form-label-govt" for="phoneInput">Mobile Number</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border:2px solid var(--border);border-right:none;background:#f5f5f5;font-weight:600;">+91</span>
                        <input type="tel" id="phoneInput" class="form-control form-control-govt" placeholder="Enter 10-digit mobile number" maxlength="10" style="border-left:none;">
                    </div>
                    <div class="invalid-feedback">Please enter a valid 10-digit mobile number.</div>
                </div>
                <button id="sendOtpBtn" class="btn btn-govt w-100" onclick="sendOTP()">
                    <i class="bi bi-send"></i> Send OTP
                </button>
            </div>

            <!-- OTP Section -->
            <div id="otpSection" class="otp-section">
                <div class="text-center mb-3">
                    <div class="verify-badge mb-2"><i class="bi bi-check-circle"></i> OTP Sent Successfully</div>
                    <p class="text-muted small">Enter the 6-digit OTP sent to <strong id="otpPhone"></strong></p>
                    <p class="text-muted small">(Demo OTP: <strong>123456</strong>)</p>
                </div>
                <div class="mb-3">
                    <label class="form-label-govt" for="otpInput">Enter OTP</label>
                    <input type="text" id="otpInput" class="form-control form-control-govt text-center" placeholder="● ● ● ● ● ●" maxlength="6" style="font-size:1.3rem;letter-spacing:8px;">
                    <div class="invalid-feedback">Invalid OTP. Please try again.</div>
                </div>
                <button id="verifyOtpBtn" class="btn btn-govt w-100 mb-2" onclick="verifyOTP()">
                    <i class="bi bi-shield-check"></i> Verify OTP
                </button>
                <button class="btn btn-govt-outline w-100" onclick="resetLogin()">
                    <i class="bi bi-arrow-left"></i> Change Number
                </button>
            </div>

            <hr class="my-4">
            <div class="text-center">
                <a href="officer-login.html" class="text-decoration-none" style="color:var(--accent);font-weight:500;">
                    <i class="bi bi-shield-lock"></i> Officer Login
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>

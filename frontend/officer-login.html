<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Login — Crop Damage Assessment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="login-wrapper" style="background:linear-gradient(135deg,rgba(21,101,192,.88),rgba(27,94,32,.75)),url('assets/farm-bg.jpg') center/cover no-repeat;">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon" style="background:linear-gradient(135deg,var(--accent),var(--accent-light));"><i class="bi bi-shield-lock"></i></div>
                <h2>Officer Login</h2>
                <p>Government Agriculture Insurance Portal</p>
            </div>
            <div class="mb-3">
                <label class="form-label-govt" for="officerUsername">Username</label>
                <input type="text" id="officerUsername" class="form-control form-control-govt" placeholder="Enter username" value="officer">
            </div>
            <div class="mb-3">
                <label class="form-label-govt" for="officerPassword">Password</label>
                <input type="password" id="officerPassword" class="form-control form-control-govt" placeholder="Enter password" value="officer123">
            </div>
            <button class="btn btn-accent w-100 mb-3" onclick="officerLogin()" style="padding:12px;font-weight:600;">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
            <div class="text-center">
                <small class="text-muted">Demo: officer / officer123</small><br>
                <a href="login.html" class="text-decoration-none"><i class="bi bi-arrow-left"></i> Farmer Login</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/utils.js"></script>
    <script>
        // Redirect if already logged in
        if (getOfficerSession()) window.location.href = 'officer.html';

        async function officerLogin() {
            const username = document.getElementById('officerUsername').value.trim();
            const password = document.getElementById('officerPassword').value.trim();
            if (!username || !password) { showToast('Please enter credentials.', 'error'); return; }
            showSpinner('Authenticating...');
            try {
                const res = await apiPost('/api/officer/login', { username, password });
                hideSpinner();
                if (res.success) {
                    saveOfficerSession(res.officer);
                    showToast('Welcome, Officer!', 'success');
                    setTimeout(() => { window.location.href = 'officer.html'; }, 800);
                } else { showToast(res.message || 'Invalid credentials.', 'error'); }
            } catch (e) { hideSpinner(); showToast('Server error.', 'error'); }
        }

        document.getElementById('officerPassword').addEventListener('keypress', e => { if (e.key === 'Enter') officerLogin(); });
    </script>
</body>
</html>

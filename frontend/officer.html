<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Dashboard — Crop Damage Assessment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div id="navbar-root"></div>
    <div class="page-wrapper">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <h4 class="section-title mb-0"><i class="bi bi-shield-check"></i> Officer Dashboard</h4>
                <div class="d-flex gap-2">
                    <select id="filterStatus" class="form-select form-select-govt" style="width:auto;" onchange="filterClaims()">
                        <option value="all">All Status</option>
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                        <option value="reinspection">Re-inspection</option>
                    </select>
                </div>
            </div>

            <!-- Stats -->
            <div class="row g-3 mb-4" id="officerStats"></div>

            <!-- Claims Table -->
            <div class="card-govt">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-govt mb-0">
                            <thead>
                                <tr>
                                    <th>Claim ID</th><th>Farmer</th><th>Crop</th><th>Damage</th><th>AI Score</th><th>Eligibility</th><th>Status</th><th>Date</th><th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="claimsTableBody">
                                <tr><td colspan="9" class="text-center py-4 text-muted">Loading claims...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="footer-govt"><p>© 2026 AI-Based Crop Damage Assessment & Compensation System — Government of India</p></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/officer.js"></script>
</body>
</html>
